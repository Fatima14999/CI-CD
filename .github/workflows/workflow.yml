```yaml id="e2yq0o"
name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Linting
        run: npm run lint

      - name: Run Jest tests
        run: npm test

      - name: Complete job
        run: echo "Workflow completed successfully"
```
